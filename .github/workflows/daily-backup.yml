name: Daily Firestore backup

# Runs every day at 4:00 PM America/New_York. Cron is UTC-only, so we
# list both DST and standard offsets; only one actually matches "4 PM ET"
# on any given day. Idempotent because both runs produce the same
# YYYY-MM-DD.json filename.
on:
  schedule:
    - cron: "0 20 * * *"  # 4 PM ET during Daylight Saving (Mar-Nov)
    - cron: "0 21 * * *"  # 4 PM ET during Standard Time  (Nov-Mar)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Full history so we can rebase onto an advanced main before pushing
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install firebase-admin
        run: npm install --no-save firebase-admin@12

      - name: Fetch Firestore via service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -eu
          if [ -z "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is missing. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p backups
          DATE=$(TZ=America/New_York date +%Y-%m-%d)
          echo "Backup date (ET): $DATE"
          # Write the service account JSON to disk (temp, not committed)
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > sa.json
          node -e "
            const fs=require('fs');
            const admin=require('firebase-admin');
            admin.initializeApp({credential:admin.credential.cert(require('./sa.json'))});
            const db=admin.firestore();
            (async()=>{
              // caseMeta now lives in wilmer/cm_* shards; records + config stay
              // in wilmer/data. Read the whole collection and reassemble a single
              // combined object (with a top-level caseMeta) so the backup format
              // and the in-app restore stay unchanged.
              const qs=await db.collection('wilmer').get();
              let data=null; const caseMeta={};
              qs.forEach(doc=>{
                const id=doc.id, d=doc.data()||{};
                if(id==='data'){ data=d; if(d.caseMeta) Object.assign(caseMeta, d.caseMeta); }
                else if(id.indexOf('cm_')===0){ if(d.caseMeta) Object.assign(caseMeta, d.caseMeta); }
              });
              if(!data){console.error('No wilmer/data document');process.exit(1);}
              data.caseMeta=caseMeta;
              const date='${DATE}';
              fs.writeFileSync('backups/'+date+'.json', JSON.stringify(data));
              const recs=Array.isArray(data.records)?data.records.length:0;
              const clients=recs?new Set(data.records.map(r=>r.clid||r.id)).size:0;
              const savedAt=data._savedAt?new Date(data._savedAt).toISOString():'n/a';
              fs.writeFileSync('backups/.meta', JSON.stringify({date,records:recs,clients,savedAt}));
              console.log('records:',recs,'| clients:',clients,'| caseMeta:',Object.keys(caseMeta).length,'| savedAt:',savedAt);
            })().catch(e=>{console.error(e);process.exit(1);});
          "
          # Never keep the credential on disk longer than needed
          shred -u sa.json 2>/dev/null || rm -f sa.json

      - name: Prune backups older than 30 days
        run: |
          set -eu
          CUTOFF=$(TZ=America/New_York date -d '30 days ago' +%Y-%m-%d)
          echo "Deleting backups before $CUTOFF"
          for f in backups/*.json; do
            [ -e "$f" ] || continue
            BN=$(basename "$f" .json)
            case "$BN" in
              [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9])
                if [ "$BN" \< "$CUTOFF" ]; then
                  echo "  rm $f"
                  rm -f "$f"
                fi
                ;;
            esac
          done

      - name: Commit and push if changed
        run: |
          set -eu
          git config user.name  "wilmer-cases-backup-bot"
          git config user.email "backup-bot@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          META=$(cat backups/.meta 2>/dev/null || echo '{}')
          DATE=$(node -e "console.log(JSON.parse(process.argv[1]).date)" "$META")
          RECS=$(node -e "console.log(JSON.parse(process.argv[1]).records)" "$META")
          rm -f backups/.meta
          git add backups/
          git commit -m "backup: $DATE daily snapshot ($RECS records)"
          # Push with retry: if main advanced since checkout, rebase and retry
          # so a moved-ahead branch self-heals instead of failing the run.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push attempt $i rejected; fetching and rebasing onto latest main…"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; true; }
            sleep $((i * 3))
          done
          echo "::error::Failed to push backup after 5 attempts. If the log shows 'protected branch hook declined', allow wilmer-cases-backup-bot to push in Settings → Branches/Rules."
          exit 1
