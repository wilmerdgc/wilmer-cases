name: Deploy app to Firebase Hosting

# Publishes the app whenever the served files change on main. Reuses the same
# FIREBASE_SERVICE_ACCOUNT secret the daily backup already uses, so there's no
# command line and no extra credentials to manage — merge to main and it goes
# live. Trigger manually any time from the Actions tab via "Run workflow".
on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'g-28-template.pdf'
      - 'templates/**'
      - 'firebase.json'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy hosting via service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          set -eu
          if [ -z "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is missing. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Write the service account JSON to a temp file (never committed)
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          firebase deploy --only hosting --project wilmer-case-law --non-interactive
          # Never keep the credential on disk longer than needed
          shred -u "$RUNNER_TEMP/sa.json" 2>/dev/null || rm -f "$RUNNER_TEMP/sa.json"
